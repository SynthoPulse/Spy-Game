<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="icon" type="image/png" href="icon.png">
    <title>Spy Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Poppins:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #f8fafc; user-select: none; overflow-x: hidden; transition: 0.3s; }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 2px solid #0ea5e9; border-radius: 25px; box-shadow: 0 0 20px rgba(14, 165, 233, 0.2); backdrop-filter: blur(10px); }
        .btn-neon { background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; font-weight: 900; transition: 0.2s; border: none; cursor: pointer; }
        .btn-neon:active { transform: scale(0.95); box-shadow: 0 0 15px #0ea5e9; }
        .hidden { display: none !important; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; text-align: center; font-size: 1.1rem; outline: none; transition: 0.3s; font-weight: bold; }
        input:focus { border-color: #0ea5e9; background: #1e293b; box-shadow: 0 0 10px rgba(14,165,233,0.3); }
        .category-btn { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 15px; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .category-btn:active { border-color: #0ea5e9; background: #0f172a; transform: scale(0.95); }
        .clear-image { width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(14, 165, 233, 0.4)); margin-bottom: 1.5rem; }
        .spy-avatar-container { position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 1.5rem; }
        .spy-glow { position: absolute; width: 140px; height: 140px; background: #ef4444; border-radius: 50%; filter: blur(35px); opacity: 0.6; animation: pulse 2s infinite; }
        .spy-icon-solid { font-size: 140px; color: #0f172a; position: relative; z-index: 10; filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.8)); }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(0.9); opacity: 0.5; } }
        .lang-btn { background: #1e293b; border: 2px solid #334155; padding: 10px; border-radius: 12px; font-weight: bold; transition: 0.2s; }
        .lang-btn.active { border-color: #0ea5e9; background: #0ea5e9; color: #000; }
        #settings-modal { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <button onclick="toggleSettings()" class="absolute top-6 right-6 text-slate-400 hover:text-sky-400 text-3xl transition-colors z-50">
        <i class="fa-solid fa-gear"></i>
    </button>

    <div id="settings-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card p-6 w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6 text-sky-400" data-i18n="settingsTitle">إعدادات اللغة</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="setLang('ar')" id="l-ar" class="lang-btn active">العربية 🇸🇦</button>
                <button onclick="setLang('en')" id="l-en" class="lang-btn">English 🇬🇧</button>
                <button onclick="setLang('es')" id="l-es" class="lang-btn">Español 🇪🇸</button>
                <button onclick="setLang('fr')" id="l-fr" class="lang-btn">Français 🇫🇷</button>
            </div>
            <button onclick="toggleSettings()" class="btn-neon w-full py-3 rounded-xl text-lg" data-i18n="close">إغلاق</button>
        </div>
    </div>

    <div id="s-setup" class="w-full max-w-md glass-card p-6 text-center relative">
        <i class="fa-solid fa-user-secret text-6xl mb-4 text-[#0ea5e9] drop-shadow-[0_0_15px_rgba(14,165,233,0.5)]"></i>
        <h1 class="text-4xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-600" data-i18n="title">الجاسوس</h1>

        <div class="bg-slate-900 p-4 rounded-2xl mb-4 border border-slate-800">
            <p class="text-sm font-bold text-sky-400 mb-3" data-i18n="players">عدد اللاعبين (3 - 20)</p>
            <div class="flex justify-center items-center gap-6">
                <button onclick="changeC('p', -1)" class="w-10 h-10 bg-slate-800 rounded-lg text-xl font-bold">-</button>
                <span id="p-val" class="text-3xl font-black w-8">4</span>
                <button onclick="changeC('p', 1)" class="w-10 h-10 bg-slate-800 rounded-lg text-xl font-bold">+</button>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-2xl mb-4 border border-slate-800">
            <p class="text-sm font-bold text-sky-400 mb-3" data-i18n="spies">عدد الجواسيس (1 - 3)</p>
            <div class="flex justify-center items-center gap-6">
                <button onclick="changeC('s', -1)" class="w-10 h-10 bg-slate-800 rounded-lg text-xl font-bold">-</button>
                <span id="s-val" class="text-3xl font-black w-8">1</span>
                <button onclick="changeC('s', 1)" class="w-10 h-10 bg-slate-800 rounded-lg text-xl font-bold">+</button>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-2xl mb-6 border border-slate-800">
            <p class="text-sm font-bold text-sky-400 mb-3" data-i18n="time">وقت الجولة</p>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="setT(3)" id="t3" class="bg-slate-800 py-2 rounded-lg font-bold">3</button>
                <button onclick="setT(5)" id="t5" class="bg-sky-600 text-white py-2 rounded-lg font-bold">5</button>
                <button onclick="setT(7)" id="t7" class="bg-slate-800 py-2 rounded-lg font-bold">7</button>
                <button onclick="setT(10)" id="t10" class="bg-slate-800 py-2 rounded-lg font-bold">10</button>
            </div>
        </div>
        <button onclick="goNames()" class="btn-neon w-full py-4 rounded-2xl text-xl font-black" data-i18n="enterNames">إدخال الأسماء</button>
    </div>

    <div id="s-names" class="w-full max-w-md glass-card p-6 text-center hidden">
        <h2 class="text-2xl font-black mb-6 text-sky-400" data-i18n="whoPlays">من يشارك في اللعبة؟</h2>
        <div id="names-list" class="max-h-[300px] overflow-y-auto space-y-3 mb-6 p-2"></div>
        <button onclick="goCats()" class="btn-neon w-full py-4 rounded-2xl text-xl font-black" data-i18n="chooseMission">اختيار المهمة</button>
    </div>

    <div id="s-cats" class="w-full max-w-md glass-card p-6 text-center hidden">
        <h2 class="text-2xl font-black mb-4 text-sky-400" data-i18n="chooseCards">اختر البطاقات</h2>
        <div id="score-board" class="flex flex-wrap justify-center gap-2 mb-4 text-sm font-bold empty:hidden"></div>
        <button onclick="start('عشوائي')" class="w-full py-4 mb-4 rounded-2xl bg-gradient-to-r from-purple-600 to-sky-600 font-black text-xl border border-white/20 text-white" data-i18n="random">🎲 عشوائي شامل</button>
        <div id="cats-grid" class="grid grid-cols-2 gap-3 max-h-[350px] overflow-y-auto p-1"></div>
    </div>

    <div id="s-pass" class="w-full max-w-md text-center hidden flex-col justify-center min-h-[400px]">
        <h3 class="text-2xl font-bold text-sky-400 mb-3" data-i18n="turnFor">الدور الآن على...</h3>
        <h2 id="p-name" class="text-6xl font-black text-white mb-12 drop-shadow-lg"></h2>
        <button onclick="showCard()" class="btn-neon w-full py-6 rounded-3xl text-3xl font-black shadow-[0_0_20px_rgba(14,165,233,0.4)]" data-i18n="showCard">رؤية بطاقتي</button>
    </div>

    <div id="s-card" class="w-full max-w-md hidden">
        <div id="card-box" class="min-h-[400px] flex flex-col items-center justify-center glass-card p-6 text-center mb-8"></div>
        <button onclick="nextP()" class="btn-neon w-full py-5 rounded-2xl text-2xl font-black" data-i18n="hidePass">حفظت (أخفِ ومرر)</button>
    </div>

    <div id="s-play" class="w-full max-w-md glass-card p-8 text-center hidden">
        <div class="bg-slate-900 p-5 rounded-3xl mb-8 border border-slate-800 shadow-inner">
            <p class="text-sm text-slate-400 font-bold mb-2" data-i18n="firstAsk">المحقق الذي يبدأ السؤال:</p>
            <h2 id="starter" class="text-4xl font-black text-sky-400 drop-shadow-md"></h2>
        </div>
        <div id="timer" class="text-8xl font-black mb-12 font-mono text-white tracking-widest drop-shadow-lg">05:00</div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="toggleP()" id="pause-btn" class="bg-slate-800 p-4 rounded-2xl font-bold text-xl" data-i18n="pause">إيقاف ⏸️</button>
            <button onclick="goVote()" class="bg-red-600 text-white p-4 rounded-2xl font-black text-xl shadow-[0_0_15px_rgba(220,38,38,0.5)]" data-i18n="vote">تصويت 🗳️</button>
        </div>
    </div>

    <div id="s-vote" class="w-full max-w-md glass-card p-6 text-center hidden">
        <h2 class="text-3xl font-black mb-2 text-red-500" data-i18n="whoIsSpy">من هو الجاسوس؟</h2>
        <p class="text-sm text-slate-400 mb-6 font-bold" data-i18n="voteDesc">اضغط على اسم الشخص المشتبه به</p>
        <div id="vote-grid" class="grid grid-cols-2 gap-3 max-h-[350px] overflow-y-auto p-1"></div>
    </div>

    <div id="s-res" class="w-full max-w-md glass-card p-6 text-center hidden">
        <div id="res-icon" class="mb-4"></div>
        <h2 id="res-title" class="text-4xl font-black mb-5"></h2>
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 mb-6 shadow-inner">
            <p class="text-sm text-slate-400 mb-4 font-bold" data-i18n="secretWas">الكلمة السرية كانت:</p>
            <div id="res-word-img-container" class="flex justify-center mb-4"></div>
            <h3 id="res-word-text" class="text-3xl font-black text-white"></h3>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="location.reload()" class="bg-slate-800 text-white py-4 rounded-2xl text-lg font-bold border border-slate-700" data-i18n="mainMenu">القائمة الرئيسية 🏠</button>
            <button onclick="newRound()" class="btn-neon py-4 rounded-2xl text-lg font-black" data-i18n="newRound">جولة جديدة 🔄</button>
        </div>
    </div>

        let currentLang = 'ar';
        let ps=4, ss=1, tm=5, names=[], scores={}, roles={}, order=[], px=0, tl=0, paused=false, interval, cw={};

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('html-tag').dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('html-tag').style.fontFamily = (lang === 'ar') ? "'Cairo', sans-serif" : "'Poppins', sans-serif";
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('l-'+lang).classList.add('active');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(uiTrans[lang][key]) el.innerText = uiTrans[lang][key];
            });

            for(let i=0; i<ps; i++) {
                let inp = document.getElementById('n'+i);
                if(inp) inp.placeholder = `${uiTrans[lang].pName} ${i+1}`;
            }
        }

        function toggleSettings() {
            const mod = document.getElementById('settings-modal');
            mod.classList.toggle('hidden');
        }

        function changeC(t,v){ 
            if(t==='p'){ ps=Math.max(3, Math.min(20, ps+v)); if(ss>=ps) ss=ps-1; }
            else { ss=Math.max(1, Math.min(3, ss+v)); if(ss>=ps) ss=ps-1; }
            document.getElementById('p-val').innerText=ps; document.getElementById('s-val').innerText=ss;
        }

        function setT(m){ 
            tm=m; 
            [3,5,7,10].forEach(x => {
                let btn = document.getElementById('t'+x);
                if(x===m) btn.className = "bg-sky-600 text-white py-2 rounded-lg font-bold transition-colors";
                else btn.className = "bg-slate-800 py-2 rounded-lg font-bold transition-colors";
            }); 
        }

        function goNames(){
            const l = document.getElementById('names-list'); l.innerHTML='';
            for(let i=0; i<ps; i++) {
                l.innerHTML+=`<input type="text" id="n${i}" placeholder="${uiTrans[currentLang].pName} ${i+1}">`;
            }
            document.getElementById('s-setup').classList.add('hidden'); 
            document.getElementById('s-names').classList.remove('hidden');
        }

        function goCats(){
            names=[]; 
            for(let i=0; i<ps; i++){ 
                let val = document.getElementById('n'+i).value.trim(); 
                let finalName = val || `${uiTrans[currentLang].pName} ${i+1}`; 
                names.push(finalName); 
                if(scores[finalName] === undefined) scores[finalName]=0; 
            }
            const g = document.getElementById('cats-grid'); g.innerHTML='';
            for(let c in dbRaw){
                g.innerHTML+=`<button onclick="start('${c}')" class="category-btn hover:bg-slate-800"><i class="fa-solid ${dbRaw[c].i} text-3xl mb-2 text-sky-400"></i><span class="font-bold text-lg">${dbRaw[c].n[currentLang]}</span></button>`;
            }
            updateScores();
            document.getElementById('s-names').classList.add('hidden'); 
            document.getElementById('s-cats').classList.remove('hidden');
        }

        function start(c){
            let pool = [];
            if(c === 'عشوائي') {
                for(let k in dbRaw) {
                    let imgs = dbRaw[k].img.split('|');
                    let words = dbRaw[k][currentLang].split('|');
                    for(let i=0; i<imgs.length; i++) pool.push({n: words[i], img: `https://emojicdn.elk.sh/${imgs[i]}?style=apple`});
                }
            } else {
                let imgs = dbRaw[c].img.split('|');
                let words = dbRaw[c][currentLang].split('|');
                for(let i=0; i<imgs.length; i++) pool.push({n: words[i], img: `https://emojicdn.elk.sh/${imgs[i]}?style=apple`});
            }
            
            cw = pool[Math.floor(Math.random()*pool.length)];
            let r = Array(ps).fill('مواطن'); 
            for(let i=0; i<ss; i++) r[i]='جاسوس'; 
            r.sort(()=>Math.random()-0.5);
            order = [...names].sort(()=>Math.random()-0.5);
            roles={}; 
            for(let i=0; i<ps; i++) roles[order[i]]=r[i];
            px=0; 
            updatePass();
            document.getElementById('s-cats').classList.add('hidden'); 
            document.getElementById('s-pass').classList.remove('hidden');
            document.getElementById('s-pass').style.display = 'flex';
        }

        function updatePass(){ document.getElementById('p-name').innerText = order[px]; }

        function showCard(){
            const box = document.getElementById('card-box');
            if(roles[order[px]]==='جاسوس'){
                box.innerHTML = `
                <div class="spy-avatar-container">
                    <div class="spy-glow"></div>
                    <i class="fa-solid fa-user-secret spy-icon-solid"></i>
                </div>
                <h2 class="text-4xl font-black text-red-500 mb-3">${uiTrans[currentLang].youAreSpy}</h2>
                <p class="text-lg text-slate-300 font-bold">${uiTrans[currentLang].spyDesc}</p>`;
            } else {
                box.innerHTML = `<img src="${cw.img}" class="clear-image" alt="${cw.n}">
                <p class="text-lg text-slate-400 font-bold mb-3">${uiTrans[currentLang].missionIs}</p>
                <h2 class="text-5xl font-black text-sky-400">${cw.n}</h2>`;
            }
            document.getElementById('s-pass').classList.add('hidden'); 
            document.getElementById('s-pass').style.display = '';
            document.getElementById('s-card').classList.remove('hidden');
        }

        function nextP(){
            px++; 
            if(px < ps){ 
                updatePass(); 
                document.getElementById('s-card').classList.add('hidden'); 
                document.getElementById('s-pass').classList.remove('hidden');
                document.getElementById('s-pass').style.display = 'flex';
            }
            else { 
                document.getElementById('starter').innerText = names[Math.floor(Math.random()*ps)];
                tl = tm*60; paused=false; updateTimer();
                document.getElementById('pause-btn').innerHTML = uiTrans[currentLang].pause;
                interval = setInterval(tick, 1000);
                document.getElementById('s-card').classList.add('hidden'); 
                document.getElementById('s-play').classList.remove('hidden');
            }
        }

        function tick(){ if(!paused){ tl--; updateTimer(); if(tl<=0) goVote(); } }
        function updateTimer(){ let m=Math.floor(tl/60).toString().padStart(2, '0'); let s=(tl%60).toString().padStart(2, '0'); document.getElementById('timer').innerText=`${m}:${s}`; }
        function toggleP(){ paused=!paused; document.getElementById('pause-btn').innerHTML = paused ? uiTrans[currentLang].resume : uiTrans[currentLang].pause; }

        function goVote(){
            clearInterval(interval);
            const g = document.getElementById('vote-grid'); g.innerHTML='';
            names.forEach(n => { g.innerHTML+=`<button onclick="check('${n}')" class="bg-slate-800 p-4 rounded-xl font-bold border border-slate-700 hover:border-red-500 active:bg-red-900 transition-colors text-white shadow-md">${n}</button>`; });
            document.getElementById('s-play').classList.add('hidden'); 
            document.getElementById('s-vote').classList.remove('hidden');
        }

        function check(n){
            const win = roles[n]==='جاسوس';
            const icon = document.getElementById('res-icon'); const title = document.getElementById('res-title');
            if(win){
                icon.innerHTML='<i class="fa-solid fa-check-circle text-8xl text-sky-400 drop-shadow-[0_0_15px_rgba(14,165,233,0.5)]"></i>'; 
                title.className="text-4xl font-black mb-5 text-sky-400";
                title.innerText= uiTrans[currentLang].citWin;
                names.forEach(x=> { if(roles[x]!=='جاسوس') scores[x]++; });
            } else {
                icon.innerHTML=`<div class="spy-avatar-container scale-75 mb-0"><div class="spy-glow"></div><i class="fa-solid fa-user-secret spy-icon-solid"></i></div>`; 
                title.className="text-4xl font-black mb-5 text-red-500";
                title.innerText= uiTrans[currentLang].spyWin;
                names.forEach(x=> { if(roles[x]==='جاسوس') scores[x]+=2; });
            }
            document.getElementById('res-word-img-container').innerHTML = `<img src="${cw.img}" class="w-28 h-28 object-contain filter drop-shadow-xl">`;
            document.getElementById('res-word-text').innerText = cw.n;
            updateScores();
            document.getElementById('s-vote').classList.add('hidden'); 
            document.getElementById('s-res').classList.remove('hidden');
        }

        function updateScores(){
            const b = document.getElementById('score-board'); b.innerHTML='';
            for(let n in scores) b.innerHTML+=`<div class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 shadow-sm"><span class="text-sky-400 text-lg">${n}:</span> <span class="text-white text-lg">${scores[n]}</span></div>`;
        }

        function newRound() {
            document.getElementById('s-res').classList.add('hidden');
            document.getElementById('s-cats').classList.remove('hidden');
        }
        
        setLang('ar');
    </script>
</body>
</html>
